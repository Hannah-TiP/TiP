name: TIP Customer Frontend CI/CD

on:
  push:
    branches:
      - develop  # Auto-deploy to preview
      - main     # Auto-deploy to production
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:  # Manual trigger for production or preview
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

env:
  NODE_VERSION: 20

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci

      - name: Check Formatting
        run: npx prettier --check "src/**/*.{ts,tsx}" "e2e/**/*.ts" "*.{ts,mjs}"

      - name: Run Linting
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm test

      - name: Cache Next.js Build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Build Application
        run: npm run build

      - name: Check Bundle Size
        run: npm run bundle-check

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: |
            .next/
            public/
          retention-days: 7

  lighthouse:
    runs-on: ubuntu-latest
    needs: [test-and-build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Prepare standalone server
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Run Lighthouse CI
        run: npx lhci autorun

      - name: Upload Lighthouse Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ github.sha }}
          path: .lighthouseci/
          retention-days: 7

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: [test-and-build]
    # Build Docker on develop/main branch push or manual dispatch
    if: ((github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main') && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      registry: ${{ steps.vars.outputs.registry }}
      username: ${{ steps.vars.outputs.username }}
      image_base: ${{ steps.vars.outputs.image_base }}
      tag_versioned: ${{ steps.vars.outputs.tag_versioned }}
      tag_latest: ${{ steps.vars.outputs.tag_latest }}
      environment: ${{ steps.vars.outputs.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker Tags
        id: vars
        run: |
          # Extract short SHA
          SHORT_SHA=${GITHUB_SHA::8}
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

          # Use GitHub Container Registry
          REGISTRY="ghcr.io"
          # Convert repository owner to lowercase (required for ghcr.io)
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          # Determine environment tag
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV_TAG="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV_TAG="production"
          elif [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            ENV_TAG="preview"
          else
            ENV_TAG="preview"
          fi

          # Build image tags
          IMAGE_BASE="$REGISTRY/$REPO_OWNER/tip-customer"
          TAG_VERSIONED="$IMAGE_BASE:$ENV_TAG-$SHORT_SHA"
          TAG_LATEST="$IMAGE_BASE:$ENV_TAG-latest"

          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "username=$REPO_OWNER" >> $GITHUB_OUTPUT
          echo "image_base=$IMAGE_BASE" >> $GITHUB_OUTPUT
          echo "tag_versioned=$TAG_VERSIONED" >> $GITHUB_OUTPUT
          echo "tag_latest=$TAG_LATEST" >> $GITHUB_OUTPUT
          echo "environment=$ENV_TAG" >> $GITHUB_OUTPUT

          echo "🐳 Docker tags prepared:"
          echo "  Registry: GitHub Container Registry (ghcr.io)"
          echo "  Repository: $REPO_OWNER/tip-customer"
          echo "  Environment: $ENV_TAG"
          echo "  Versioned tag: $TAG_VERSIONED"
          echo "  Latest tag: $TAG_LATEST"

      - name: Decrypt environment config
        run: |
          ENV="${{ steps.vars.outputs.environment }}"
          gpg --quiet --batch --yes \
            --decrypt \
            --passphrase="${{ secrets.ENV_PASSPHRASE }}" \
            "secrets/env.tip.${ENV}.gpg" > /tmp/env.${ENV}

      - name: Extract build args
        id: build-env
        run: |
          ENV="${{ steps.vars.outputs.environment }}"
          set -a; source /tmp/env.${ENV}; set +a
          echo "s3_endpoint=${NEXT_PUBLIC_S3_ENDPOINT}" >> $GITHUB_OUTPUT
          echo "api_base_url=${NEXT_PUBLIC_API_BASE_URL}" >> $GITHUB_OUTPUT
          echo "gmaps_key=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}" >> $GITHUB_OUTPUT
          echo "gmaps_map_id=${NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID}" >> $GITHUB_OUTPUT
          echo "google_client_id=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.vars.outputs.tag_versioned }}
            ${{ steps.vars.outputs.tag_latest }}
          cache-from: type=registry,ref=${{ steps.vars.outputs.tag_latest }}
          cache-to: type=inline
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.vars.outputs.environment }}-${{ steps.vars.outputs.short_sha }}
            NEXT_PUBLIC_S3_ENDPOINT=${{ steps.build-env.outputs.s3_endpoint }}
            NEXT_PUBLIC_API_BASE_URL=${{ steps.build-env.outputs.api_base_url }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ steps.build-env.outputs.gmaps_key }}
            NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID=${{ steps.build-env.outputs.gmaps_map_id }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ steps.build-env.outputs.google_client_id }}

  deploy-preview:
    runs-on: ubuntu-latest
    needs: [build-and-push-docker]
    if: needs.build-and-push-docker.outputs.environment == 'preview'
    environment: preview
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload env to server
        run: |
          gpg --quiet --batch --yes \
            --decrypt \
            --passphrase="${{ secrets.ENV_PASSPHRASE }}" \
            secrets/env.tip.preview.gpg | \
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cat > ~/.env.tip.preview && chmod 600 ~/.env.tip.preview"

      - name: Get current image
        id: prev-image
        run: |
          PREV_TAG=$(ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "docker ps --filter name=tip-customer-preview --format '{{.Image}}'" 2>/dev/null || echo "")
          echo "tag=${PREV_TAG}" >> $GITHUB_OUTPUT

      - name: Deploy container
        run: |
          TAG="${{ needs.build-and-push-docker.outputs.tag_latest }}"
          GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          GHCR_USER="${{ github.actor }}"
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENDSSH
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            docker pull ${TAG}
            docker logout ghcr.io
            docker stop tip-customer-preview || true
            docker rm tip-customer-preview || true
            docker run -d --name tip-customer-preview --restart unless-stopped \
              -p 9200:3000 --env-file ~/.env.tip.preview ${TAG}
            docker image prune -f
          ENDSSH

      - name: Health check (12 x 10s = 2min)
        run: |
          PREV_TAG="${{ steps.prev-image.outputs.tag }}"
          for i in $(seq 1 12); do
            if ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "curl -sf http://localhost:9200/api/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/12 - waiting 10s..."
            sleep 10
          done
          echo "Health check failed - rolling back to ${PREV_TAG:-previous image}"
          if [ -n "$PREV_TAG" ]; then
            ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENDSSH
              docker stop tip-customer-preview || true
              docker rm tip-customer-preview || true
              docker run -d --name tip-customer-preview --restart unless-stopped \
                -p 9200:3000 --env-file ~/.env.tip.preview $PREV_TAG
              echo "Rolled back to $PREV_TAG"
            ENDSSH
          fi
          exit 1

      - name: Smoke test pages
        run: |
          BASE="https://staging.travelinyourpocket.com"
          FAILED=0
          for path in "/" "/dream-hotels" "/sign-in" "/api/health"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${BASE}${path}")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "OK  ${path} (${STATUS})"
            else
              echo "FAIL ${path} (${STATUS})"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "Smoke test failed - some pages returned errors"
            exit 1
          fi
          echo "All preview pages responding"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-and-push-docker]
    if: needs.build-and-push-docker.outputs.environment == 'production'
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload env to server
        run: |
          gpg --quiet --batch --yes \
            --decrypt \
            --passphrase="${{ secrets.ENV_PASSPHRASE }}" \
            secrets/env.tip.production.gpg | \
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cat > ~/.env.tip.production && chmod 600 ~/.env.tip.production"

      - name: Get current image
        id: prev-image
        run: |
          PREV_TAG=$(ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "docker ps --filter name=tip-customer-production --format '{{.Image}}'" 2>/dev/null || echo "")
          echo "tag=${PREV_TAG}" >> $GITHUB_OUTPUT

      - name: Deploy container
        run: |
          TAG="${{ needs.build-and-push-docker.outputs.tag_latest }}"
          GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          GHCR_USER="${{ github.actor }}"
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENDSSH
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
            docker pull ${TAG}
            docker logout ghcr.io
            docker stop tip-customer-production || true
            docker rm tip-customer-production || true
            docker run -d --name tip-customer-production --restart unless-stopped \
              -p 9201:3000 --env-file ~/.env.tip.production ${TAG}
            docker image prune -f
          ENDSSH

      - name: Health check (12 x 10s = 2min)
        run: |
          PREV_TAG="${{ steps.prev-image.outputs.tag }}"
          for i in $(seq 1 12); do
            if ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "curl -sf http://localhost:9201/api/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/12 - waiting 10s..."
            sleep 10
          done
          echo "Health check failed - rolling back to ${PREV_TAG:-previous image}"
          if [ -n "$PREV_TAG" ]; then
            ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENDSSH
              docker stop tip-customer-production || true
              docker rm tip-customer-production || true
              docker run -d --name tip-customer-production --restart unless-stopped \
                -p 9201:3000 --env-file ~/.env.tip.production $PREV_TAG
              echo "Rolled back to $PREV_TAG"
            ENDSSH
          fi
          exit 1

      - name: Smoke test pages
        run: |
          BASE="https://www.travelinyourpocket.com"
          FAILED=0
          for path in "/" "/dream-hotels" "/sign-in" "/api/health"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${BASE}${path}")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "OK  ${path} (${STATUS})"
            else
              echo "FAIL ${path} (${STATUS})"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "Smoke test failed - some pages returned errors"
            exit 1
          fi
          echo "All production pages responding"

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build-and-push-docker, deploy-preview, deploy-production]
    if: |
      always() &&
      (needs.deploy-preview.result == 'success' || needs.deploy-production.result == 'success')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Determine E2E target URL
        id: e2e-url
        run: |
          ENV="${{ needs.build-and-push-docker.outputs.environment }}"
          if [ "$ENV" == "production" ]; then
            echo "url=https://www.travelinyourpocket.com" >> $GITHUB_OUTPUT
          else
            echo "url=https://staging.travelinyourpocket.com" >> $GITHUB_OUTPUT
          fi

      - name: Run E2E Tests
        env:
          E2E_BASE_URL: ${{ steps.e2e-url.outputs.url }}
        run: npx playwright test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: test-results/
          retention-days: 7

  notification:
    runs-on: ubuntu-latest
    needs: [build-and-push-docker, deploy-preview, deploy-production, e2e-tests]
    if: always()
    steps:
      - name: Determine deployment result
        id: result
        run: |
          ENV="${{ needs.build-and-push-docker.outputs.environment }}"
          echo "environment=${ENV}" >> $GITHUB_OUTPUT

          if [ "$ENV" == "preview" ]; then
            echo "status=${{ needs.deploy-preview.result }}" >> $GITHUB_OUTPUT
            echo "url=https://staging.travelinyourpocket.com" >> $GITHUB_OUTPUT
          elif [ "$ENV" == "production" ]; then
            echo "status=${{ needs.deploy-production.result }}" >> $GITHUB_OUTPUT
            echo "url=https://www.travelinyourpocket.com" >> $GITHUB_OUTPUT
          fi

      - name: Print deployment status
        run: |
          if [ "${{ steps.result.outputs.status }}" == "success" ]; then
            echo "TIP Customer Frontend ${{ steps.result.outputs.environment }} deployment successful"
            echo "Live at: ${{ steps.result.outputs.url }}"
          else
            echo "TIP Customer Frontend ${{ steps.result.outputs.environment }} deployment failed"
          fi

      - name: Send Slack notification
        if: vars.SLACK_WEBHOOK_URL != ''
        run: |
          ENV="${{ steps.result.outputs.environment }}"
          STATUS="${{ steps.result.outputs.status }}"
          URL="${{ steps.result.outputs.url }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          ACTOR="${{ github.actor }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" == "success" ]; then
            COLOR="#36a64f"
            EMOJI="white_check_mark"
            TEXT="deployed successfully"
          else
            COLOR="#dc3545"
            EMOJI="x"
            TEXT="deployment failed"
          fi

          curl -sf -X POST "${{ vars.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [{
                \"color\": \"${COLOR}\",
                \"blocks\": [{
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \":${EMOJI}: *TiP Customer* ${ENV} ${TEXT}\n*Commit:* ${SHORT_SHA} by ${ACTOR}\n*URL:* ${URL}\n<${RUN_URL}|View workflow>\"
                  }
                }]
              }]
            }"
